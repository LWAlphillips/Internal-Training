// ────────────────────────────────────────────────
// IMPROVED PDF EXPORT – supports BOTH employee and topic views
// ────────────────────────────────────────────────
async function exportPDF() {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) {
    alert("jsPDF not loaded.");
    return;
  }

  const detailPane = document.getElementById("detailPane");
  if (!detailPane || detailPane.innerHTML.trim() === '' || detailPane.innerHTML.includes("Click a topic or employee")) {
    alert("No content to export – select a topic or employee first.");
    return;
  }

  try {
    // Clean capture setup
    const originalBg = detailPane.style.backgroundColor;
    const originalColor = detailPane.style.color;
    const originalOverflow = detailPane.style.overflow;
    detailPane.style.backgroundColor = "#ffffff";
    detailPane.style.color = "#000000";
    detailPane.style.overflow = "visible";

    const parent = detailPane.parentElement;
    const originalParentHeight = parent.style.height;
    parent.style.height = "auto";

    const canvas = await html2canvas(detailPane, {
      scale: 1.8,
      useCORS: true,
      logging: false,
      backgroundColor: "#ffffff",
      windowWidth: detailPane.scrollWidth + 40,
      windowHeight: detailPane.scrollHeight + 40,
      height: detailPane.scrollHeight,
      width: detailPane.scrollWidth
    });

    detailPane.style.backgroundColor = originalBg;
    detailPane.style.color = originalColor;
    detailPane.style.overflow = originalOverflow;
    parent.style.height = originalParentHeight;

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

    const pageWidth  = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const margin     = 10;
    const contentWidth  = pageWidth - 2 * margin;
    const contentHeight = pageHeight - 2 * margin;

    const canvasWidthPx  = canvas.width;
    const canvasHeightPx = canvas.height;

    const ratio = contentWidth / canvasWidthPx;
    const pageHeightPx = contentHeight / ratio;

    let position = 0;
    let pageNum = 0;

    while (position < canvasHeightPx) {
      if (pageNum > 0) pdf.addPage();

      const sliceHeightPx = Math.min(pageHeightPx, canvasHeightPx - position);

      const sliceCanvas = document.createElement("canvas");
      sliceCanvas.width = canvasWidthPx;
      sliceCanvas.height = sliceHeightPx;
      const ctx = sliceCanvas.getContext("2d");
      ctx.drawImage(canvas, 0, position, canvasWidthPx, sliceHeightPx, 0, 0, canvasWidthPx, sliceHeightPx);

      const sliceData = sliceCanvas.toDataURL("image/png");

      pdf.addImage(sliceData, "PNG", margin, margin, contentWidth, sliceHeightPx * ratio);

      position += pageHeightPx;
      pageNum++;
    }

    // Better filename depending on view
    let filenameBase = "Training-Report";
    const h4 = document.querySelector("#detailPane h4");
    if (h4) {
      // Employee view
      const name = h4.textContent.trim().replace(/[^a-zA-Z0-9]/g, "_").substring(0, 30);
      filenameBase = `Employee_${name}`;
    } else if (detailPane.querySelector("table th")?.textContent.includes("Employee")) {
      // Topic view – use the topic title
      const topicTitle = document.querySelector("#detailPane h4")?.textContent.trim() || "Certification-List";
      const safeTopic = topicTitle.replace(/[^a-zA-Z0-9]/g, "_").substring(0, 40);
      filenameBase = `Certification_${safeTopic}`;
    }

    const filename = `LWA_${filenameBase}_${new Date().toISOString().slice(0,10)}.pdf`;
    pdf.save(filename);

  } catch (err) {
    console.error("PDF failed:", err);
    alert("PDF export failed: " + err.message);
  }
}

// ────────────────────────────────────────────────
// UPDATED: showTopicDetail – now includes PDF button
// ────────────────────────────────────────────────
function showTopicDetail(topic) {
  const recs = topicMap[topic] || [];
  let html = `
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>${topic}</h4>
        <button class="btn btn-success btn-sm" onclick="exportPDF()">PDF Export</button>
      </div>
      <p class="text-muted mb-3">${recs.length} record(s)</p>
      <div class="table-responsive">
        <table class="table table-sm table-hover">
          <thead>
            <tr>
              <th>Employee</th>
              <th>Training Date</th>
              <th>Completion Date</th>
              <th>Expiration Date</th>
              <th>Days Remaining</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
  `;
  recs.forEach(r => {
    const norm = normalizeName(r['Employee Name']);
    const name = employeeMap[norm]?.original || r['Employee Name'];
    html += `
      <tr>
        <td><a href="javascript:void(0)" onclick="showEmployeeDetail('${norm}')">${name}</a></td>
        <td>${parseTextDate(r['Training Date'])}</td>
        <td>${parseTextDate(r['Completion Date'])}</td>
        <td>${parseTextDate(r['Expiration Date'])}</td>
        <td>${r['Days Remaining'] || '-'}</td>
        <td>${badge(r)}</td>
      </tr>
    `;
  });
  html += `</tbody></table></div></div>`;
  document.getElementById('detailPane').innerHTML = html;
}
